<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 10px 14px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header .logo {
      width: 22px; height: 22px;
      background: #10b981; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #000; font-size: 10px;
    }
    .header .brand { color: #10b981; font-weight: 700; font-size: 13px; flex: 1; }
    .header .open-dash {
      font-size: 11px; color: #888; text-decoration: none;
      border: 1px solid #1f1f1f; padding: 3px 8px; border-radius: 4px;
    }
    .header .open-dash:hover { color: #10b981; border-color: #10b981; }

    /* Settings bar */
    .settings-bar {
      padding: 8px 14px;
      border-bottom: 1px solid #1f1f1f;
      display: none;
      flex-shrink: 0;
    }
    .settings-bar.visible { display: flex; gap: 6px; align-items: center; }
    .settings-bar input {
      flex: 1; padding: 5px 8px; background: #111; border: 1px solid #1f1f1f;
      border-radius: 4px; color: #e0e0e0; font-size: 11px; font-family: monospace; outline: none;
    }
    .settings-bar input:focus { border-color: #10b981; }
    .settings-bar button {
      padding: 5px 10px; background: #10b981; color: #000; border: none;
      border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .key-hint { font-size: 10px; color: #10b981; cursor: pointer; padding: 2px 6px; }

    /* Page Info — title + save inline */
    .page-info {
      padding: 12px 14px;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
    }
    .page-title-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .page-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
    .page-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .btn-save-inline {
      flex-shrink: 0;
      padding: 4px 8px;
      background: transparent;
      color: #10b981;
      border: 1px solid #1f1f1f;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-save-inline:hover { border-color: #10b981; }
    .btn-save-inline:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save-inline.saved { background: #10b981; color: #000; border-color: #10b981; }

    /* Tabs */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: #e0e0e0; }
    .tab-btn.active {
      color: #10b981;
      border-bottom-color: #10b981;
    }

    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
    .tab-panel.active { display: flex; }

    /* Content tab */
    .content-section { flex: 1; overflow-y: auto; padding: 10px 14px; }
    .content-label {
      font-size: 11px; color: #888; font-weight: 700; margin-bottom: 6px;
      text-transform: uppercase; position: sticky; top: 0; background: #0a0a0a; padding: 4px 0;
    }
    .content-body { font-size: 12px; line-height: 1.7; color: #ccc; }
    .content-body .ts { color: #10b981; font-size: 11px; font-weight: 600; margin-right: 4px; }

    /* Summarize button inside content tab */
    .content-summarize {
      padding: 10px 14px;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
    }
    .btn-summarize {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: #10b981;
      color: #000;
    }
    .btn-summarize:hover { background: #0fa874; }
    .btn-summarize:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Summary */
    .summary-section {
      padding: 10px 14px;
      border-bottom: 1px solid #1f1f1f;
      display: none;
      flex-shrink: 0;
      max-height: 250px;
      overflow-y: auto;
    }
    .summary-section.visible { display: block; }
    .summary-label { font-size: 11px; color: #10b981; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; }
    .summary-content { font-size: 13px; line-height: 1.6; }
    .summary-content strong { color: #10b981; }

    /* Deep Tutor Chat */
    .tutor-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tutor-msg {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 92%;
    }
    .tutor-msg-user {
      background: rgba(16, 185, 129, 0.15);
      color: #e0e0e0;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }
    .tutor-msg-assistant {
      background: #1a1a1a;
      color: #e0e0e0;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }
    .tutor-msg-assistant strong { color: #10b981; }

    /* Tutor suggestion buttons */
    .tutor-suggestions {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 0;
    }
    .tutor-suggestion-btn {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid #1f1f1f;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 11px;
      padding: 6px 8px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    .tutor-suggestion-btn:hover {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }

    .tutor-input {
      display: flex;
      gap: 6px;
      padding: 10px 14px;
      border-top: 1px solid #1f1f1f;
      flex-shrink: 0;
    }
    .tutor-input input {
      flex: 1;
      padding: 8px 10px;
      background: #111;
      border: 1px solid #1f1f1f;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    .tutor-input input:focus { border-color: #10b981; }
    .tutor-input button {
      padding: 8px 12px;
      background: #10b981;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .tutor-input button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status */
    .status { font-size: 11px; text-align: center; padding: 6px; display: none; flex-shrink: 0; }
    .status.success { color: #10b981; background: rgba(16,185,129,0.1); display: block; }
    .status.error { color: #ef4444; background: rgba(239,68,68,0.1); display: block; }

    .loading { padding: 20px 14px; text-align: center; color: #10b981; font-size: 13px; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #1f1f1f; border-top: 2px solid #10b981;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">AI</div>
    <span class="brand">AI News</span>
    <span class="key-hint" id="key-toggle">🔑</span>
    <a class="open-dash" href="https://ai-news.hungphu.work" target="_blank">Dashboard</a>
  </div>

  <div class="settings-bar" id="settings-bar">
    <input type="password" id="api-key-input" placeholder="API Key..." />
    <button id="save-key-btn">Save</button>
  </div>

  <div id="loading" class="loading" style="display:none">
    <span class="spinner"></span> Loading content...
  </div>

  <div id="content-wrapper" style="display:none">
    <div class="page-info">
      <div style="display:flex;gap:10px;align-items:flex-start">
        <img id="thumbnail" src="" alt="" style="width:80px;height:45px;object-fit:cover;border-radius:4px;flex-shrink:0;display:none" />
        <div style="min-width:0;flex:1">
          <div class="page-title-row">
            <div class="page-title" id="page-title"></div>
            <button class="btn-save-inline" id="save-btn">💾 Save</button>
          </div>
          <div class="page-meta" id="page-meta"></div>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-content-btn">Content</button>
      <button class="tab-btn" id="tab-tutor-btn">🎓 Deep Tutor</button>
    </div>

    <!-- Content Tab -->
    <div class="tab-panel active" id="tab-content">
      <div class="content-summarize">
        <button class="btn-summarize" id="summarize-btn">
          ✦ Summarize
        </button>
      </div>

      <div class="summary-section" id="summary-section">
        <div class="summary-label">BuHu Summary</div>
        <div class="summary-content" id="summary-content"></div>
      </div>

      <div class="content-section">
        <div class="content-body" id="content-body"></div>
      </div>
    </div>

    <!-- Deep Tutor Tab -->
    <div class="tab-panel" id="tab-tutor">
      <div class="tutor-messages" id="tutor-messages"></div>
      <div class="tutor-input">
        <input type="text" id="tutor-input" placeholder="Ask Deep Tutor..." disabled />
        <button id="tutor-send-btn" disabled>Send</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
