<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header .logo {
      width: 24px; height: 24px;
      background: #10b981; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: #000; font-size: 11px;
    }
    .header span { color: #10b981; font-weight: 700; font-size: 13px; }

    /* Video Info */
    .video-info {
      padding: 16px;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
    }
    .video-info img {
      width: 100%; border-radius: 6px; margin-bottom: 10px;
    }
    .video-title {
      font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 4px;
    }
    .video-author {
      font-size: 12px; color: #888;
    }

    /* Actions */
    .actions {
      display: flex; gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f1f;
      flex-shrink: 0;
    }
    .actions button {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-summarize {
      background: #10b981; color: #000;
    }
    .btn-summarize:hover { background: #0fa874; }
    .btn-summarize:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save {
      background: transparent; color: #10b981; border: 1px solid #1f1f1f !important;
    }
    .btn-save:hover { border-color: #10b981 !important; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-saved {
      background: #10b981; color: #000; border: none !important;
    }

    /* Summary */
    .summary-section {
      padding: 12px 16px;
      border-bottom: 1px solid #1f1f1f;
      display: none;
      flex-shrink: 0;
      max-height: 200px;
      overflow-y: auto;
    }
    .summary-section.visible { display: block; }
    .summary-label {
      font-size: 11px; color: #10b981; font-weight: 700;
      margin-bottom: 8px; text-transform: uppercase;
    }
    .summary-content {
      font-size: 13px; line-height: 1.6; color: #e0e0e0;
    }
    .summary-content ul { padding-left: 16px; }
    .summary-content li { margin: 4px 0; }

    /* Transcript */
    .transcript-section {
      flex: 1; overflow-y: auto; padding: 12px 16px;
    }
    .transcript-label {
      font-size: 11px; color: #888; font-weight: 700;
      margin-bottom: 8px; text-transform: uppercase;
      position: sticky; top: 0; background: #0a0a0a; padding: 4px 0;
    }
    .transcript-line {
      font-size: 12px; line-height: 1.7; color: #ccc; margin-bottom: 2px;
    }
    .transcript-line .ts {
      color: #10b981; font-size: 11px; font-weight: 600; margin-right: 6px;
      cursor: pointer;
    }
    .transcript-line .ts:hover { text-decoration: underline; }

    /* Loading */
    .loading {
      padding: 24px 16px; text-align: center; color: #10b981; font-size: 13px;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #1f1f1f; border-top: 2px solid #10b981;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Not YouTube */
    .not-youtube {
      padding: 32px 16px; text-align: center; color: #888; font-size: 13px;
    }
    .not-youtube a { color: #10b981; }

    /* Status */
    .status {
      font-size: 11px; text-align: center; padding: 6px;
      display: none;
    }
    .status.success { color: #10b981; background: rgba(16,185,129,0.1); display: block; }
    .status.error { color: #ef4444; background: rgba(239,68,68,0.1); display: block; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">AI</div>
    <span>BuHu · YouTube</span>
  </div>

  <div id="loading" class="loading" style="display:none">
    <span class="spinner"></span> Loading transcript...
  </div>

  <div id="not-youtube" class="not-youtube" style="display:none">
    <p>Navigate to a YouTube video to see the transcript.</p>
    <p style="margin-top:8px"><a href="https://ai-news.hungphu.work" target="_blank">Open Dashboard →</a></p>
  </div>

  <div id="content" style="display:none">
    <div class="video-info">
      <img id="thumbnail" src="" alt="Video thumbnail" />
      <div class="video-title" id="video-title"></div>
      <div class="video-author" id="video-author"></div>
    </div>

    <div class="actions">
      <button class="btn-summarize" id="summarize-btn">
        <span class="spinner" style="display:none" id="sum-spinner"></span>
        ✦ Summarize
      </button>
      <button class="btn-save" id="save-btn">💾 Save</button>
    </div>

    <div id="status" class="status"></div>

    <div class="summary-section" id="summary-section">
      <div class="summary-label">BuHu Summary</div>
      <div class="summary-content" id="summary-content"></div>
    </div>

    <div class="transcript-section">
      <div class="transcript-label">Transcript</div>
      <div id="transcript"></div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
